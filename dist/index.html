<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Inter+Tight:wght@700&display=swap" rel="stylesheet"/><title>Mundo Pet</title><script defer="defer" src="main.js"></script></head><body><main id="app"><div class="container"><section id="logo"><img src="./assets/logo.svg" alt="Mundo Pet"/></section><section id="appointments"><header><div class="title"><h1>Sua agenda</h1><p>Aqui você pode ver todos os clientes e serviços agendados para hoje.</p></div><div class="input"><img src="assets/calendar.svg" alt=""> <input type="date" id="date" name="date" required> <img src="assets/arrow.svg" alt=""></div></header><ul class="periods"><li class="card period-morning"><ul class="appointment-list period-morning"><header><img src="assets/morning.svg" alt=""><h2>Manhã</h2><span>09h-12h</span></header></ul></li><li class="card period-afternoon"><ul class="appointment-list period-afternoon"><header><img src="assets/afternoon.svg" alt=""><h2>Tarde</h2><span>13h-18h</span></header></ul></li><li class="card period-night"><ul class="appointment-list period-night"><header><img src="assets/night.svg" alt=""><h2>Noite</h2><span>19h-21h</span></header></ul></li></ul></section><section id="new-appointment"><button>Novo agendamento</button></section></div></main></body></html>
